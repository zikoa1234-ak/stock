<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 30px;
            margin: 30px 0;
            text-align: left;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            font-weight: 600;
            color: #495057;
        }
        
        .status-value {
            color: #28a745;
            font-weight: 600;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
            transform: translateY(-2px);
        }
        
        .footer {
            margin-top: 40px;
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📦</div>
        <h1>Stock Management System</h1>
        <p class="subtitle">Complete inventory tracking and management solution</p>
        
        <div class="status-card">
            <h2 style="color: #333; margin-bottom: 20px;">System Status</h2>
            
            <div class="status-item">
                <span class="status-label">API Status</span>
                <span class="status-value" id="apiStatus">Checking...</span>
            </div>
            
            <div class="status-item">
                <span class="status-label">Database</span>
                <span class="status-value" id="dbStatus">Ready</span>
            </div>
            
            <div class="status-item">
                <span class="status-label">Uptime</span>
                <span class="status-value" id="uptime">Just started</span>
            </div>
        </div>
        
        <div class="actions">
            <a href="/api/health" class="btn btn-primary" target="_blank">Check API Health</a>
            <a href="/api/items" class="btn btn-secondary" target="_blank">View Items</a>
            <button class="btn btn-secondary" onclick="refreshStatus()">Refresh Status</button>
        </div>
        
        <div class="footer">
            <p>Deployed on EasyPanel • Version 1.0.0</p>
            <p id="timestamp">Loading...</p>
        </div>
    </div>

    <script>
        // Update timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
        
        // Check API status
        async function checkApiStatus() {
            try {
                const response = await fetch('/api/health');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('apiStatus').textContent = '✅ Operational';
                    document.getElementById('apiStatus').style.color = '#28a745';
                    
                    // Update uptime
                    const started = new Date(data.timestamp);
                    const now = new Date();
                    const diff = Math.floor((now - started) / 1000);
                    document.getElementById('uptime').textContent = `${diff} seconds`;
                } else {
                    document.getElementById('apiStatus').textContent = '❌ Error';
                    document.getElementById('apiStatus').style.color = '#dc3545';
                }
            } catch (error) {
                document.getElementById('apiStatus').textContent = '❌ Offline';
                document.getElementById('apiStatus').style.color = '#dc3545';
            }
        }
        
        function refreshStatus() {
            document.getElementById('apiStatus').textContent = 'Checking...';
            document.getElementById('apiStatus').style.color = '#6c757d';
            checkApiStatus();
        }
        
        // Initial check
        checkApiStatus();
        
        // Auto-refresh every 30 seconds
        setInterval(checkApiStatus, 30000);
    </script>
</body>
</html>
