version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stock-management-db
    environment:
      POSTGRES_DB: stock_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-management-backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/stock_management?schema=public
      NODE_ENV: development
      PORT: 3001
      JWT_SECRET: stock-manager-secret-key-change-this-in-production
      JWT_REFRESH_SECRET: your-refresh-token-secret-change-this-too
      CORS_ORIGIN: http://localhost:5173,http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-management-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data: